<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Zoo Habitat Planner</title>

<link rel="stylesheet" href="fonts/fonts.css">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2330;
    --card: #1c2330;
    --card-hover: #232d3f;
    --border: #2a3448;
    --border-light: #334466;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #8a6a2a;
    --green: #3a7d44;
    --green-light: #4e9e5a;
    --red: #8b2020;
    --red-light: #b52e2e;
    --text: #d4c9b0;
    --text-dim: #7a8399;
    --text-bright: #f0e8d0;
    --accent: #2d5a8e;
    --accent-light: #3a74b5;
    --selected: #1a3a5c;
    --selected-border: #4a90d9;
    --tag-bg: #1a2535;
    --tag-border: #2a3f5c;
    --incompatible: rgba(139,32,32,0.15);
    --incompatible-border: #5a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  header {
    background: linear-gradient(180deg, #0a0e14 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--gold-dim);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(201,168,76,0.3);
  }

  header p {
    color: var(--text-dim);
    font-size: 0.85rem;
    font-style: italic;
    margin-left: auto;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    height: calc(100vh - 65px);
    overflow: hidden;
  }
   
  /* Ensure middle panel takes up remaining space */
  .animal-list-section {
    grid-column: 2;
  }
   
  /* 3RD PANEL - SELECTED ANIMALS */
  .selected-panel {
    overflow-y: auto;
    padding: 24px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    grid-column: 3;
  }
   
  /* 4TH PANEL - ENCLOSURE DETAILS */
  .enclosure-panel {
    overflow-y: auto;
    padding: 24px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    grid-column: 4;
  }
  
  /* Ensure middle panel takes up remaining space */
  .animal-list-section {
    grid-column: 2;
  }

  /* === LEFT PANEL === */
  .left-panel {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    grid-column: 1;
  }

  .filters-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .options-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-row input[type="checkbox"] {
    appearance: none;
    width: 28px;
    height: 16px;
    background: var(--bg3);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-row input[type="checkbox"]::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 10px;
    height: 10px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-row input[type="checkbox"]:checked {
    background: var(--green);
    border-color: var(--green-light);
  }
  .toggle-row input[type="checkbox"]:checked::after {
    transform: translateX(12px);
    background: #fff;
  }

  .toggle-row label {
    font-size: 0.82rem;
    color: var(--text-dim);
    cursor: pointer;
  }

  .filter-group {
    margin-bottom: 14px;
  }

  .tag-group {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    padding: 4px 9px;
    border-radius: 3px;
    font-size: 0.72rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 1px solid var(--tag-border);
    background: var(--tag-bg);
    color: var(--text-dim);
    transition: all 0.15s;
    user-select: none;
  }
  .tag:hover { background: var(--bg3); color: var(--text); }
  .tag.active {
    background: var(--selected);
    border-color: var(--selected-border);
    color: var(--text-bright);
  }
  
  .filter-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  
  .filter-buttons button {
    padding: 6px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
  }
  
  .filter-buttons button:hover {
    background: var(--bg4);
    border-color: var(--border-light);
  }
  
  /* Continent icons */
  .continent-tag {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .continent-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ci-europe   { background: #5b8dd9; }
  .ci-namerica { background: #4aaa6a; }
  .ci-samerica { background: #88b843; }
  .ci-africa   { background: #d9852e; }
  .ci-asia     { background: #cc4444; }
  .ci-oceania  { background: #9b6cd9; }

  /* Biome icons */
  .biome-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .bd-grassland  { background: #6aad3a; }
  .bd-desert     { background: #d9a030; }
  .bd-tropical   { background: #2ecc71; }
  .bd-temperate  { background: #4ab3c8; }
  .bd-taiga      { background: #2e6fa3; }
  .bd-tundra     { background: #9bd4e8; }
  .bd-aquatic    { background: #2980b9; }

  /* === ANIMAL LIST === */
  .animal-list-section {
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .list-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .search-box {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent-light); }
  .search-box::placeholder { color: var(--text-dim); }

  .clear-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .clear-btn:hover { border-color: var(--red-light); color: var(--red-light); }

  .enclosure-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .enclosure-label {
    font-size: 0.72rem;
    font-family: 'Cinzel', serif;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .enclosure-input {
    width: 90px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    outline: none;
  }
  .enclosure-input:focus { border-color: var(--accent-light); }
  .enclosure-unit {
    font-size: 0.72rem;
    color: var(--text-dim);
  }
  .enclosure-clear {
    font-size: 0.7rem;
    color: var(--text-dim);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }
  .enclosure-clear:hover { color: var(--red-light); }
  .land-chip {
    font-size: 0.67rem;
    color: var(--text-dim);
    margin-left: 2px;
    white-space: nowrap;
  }

  .animal-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }

  .animal-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .animal-item:hover:not(.incompatible-item) {
    background: var(--card-hover);
    border-color: var(--border);
  }
  .animal-item.selected {
    background: var(--selected);
    border-color: var(--selected-border);
  }
  .animal-item.incompatible-item {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .animal-item.exhibit {
    border-style: dashed;
    border-color: var(--border);
  }

  .animal-img-thumb {
    width: 36px;
    height: 36px;
    border-radius: 3px;
    object-fit: cover;
    background: var(--bg3);
    flex-shrink: 0;
  }

  .animal-name-block {
    flex: 1;
    min-width: 0;
  }
  .animal-common {
    font-size: 0.88rem;
    color: var(--text-bright);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .animal-latin {
    font-size: 0.72rem;
    font-style: italic;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .animal-icons {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .icon-heart           { color: #d9534f; font-size: 0.75rem; }
  .icon-heart.mutual    { color: var(--gold-light); }
  .icon-heart.one-way   { color: #e08848; }
  .icon-shoe            { color: var(--text-dim); font-size: 0.75rem; }

  /* === RIGHT PANEL === */
  .right-panel {
    overflow-y: auto;
    padding: 24px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    grid-column: 3;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.06em;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--gold-dim);
    text-shadow: 0 0 20px rgba(201,168,76,0.2);
  }

  .empty-state {
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.95rem;
    text-align: center;
    padding: 40px 20px;
    line-height: 1.8;
  }

  /* Requirements summary */
  .req-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .req-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }
  .req-card-title {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .req-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .req-badge {
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .req-badge.compatible {
    background: rgba(58,125,68,0.2);
    border: 1px solid rgba(78,158,90,0.4);
    color: #6ec87a;
  }
  .req-badge.required {
    background: rgba(45,90,142,0.2);
    border: 1px solid rgba(58,116,181,0.4);
    color: #6aaae0;
  }
  .req-badge.warn {
    background: rgba(180,120,30,0.2);
    border: 1px solid rgba(200,150,50,0.4);
    color: #d9a040;
  }

  /* Selected animals list */
  .selected-header {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .selected-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .selected-animals {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
  }

  .selected-animal-card {
    background: var(--card);
    border: 1px solid var(--selected-border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .selected-animal-img {
    width: 52px;
    height: 52px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--bg3);
    flex-shrink: 0;
  }

  .selected-animal-info {
    flex: 1;
  }
  .selected-animal-name {
    font-size: 1rem;
    color: var(--text-bright);
    font-weight: 500;
  }
  .selected-animal-latin {
    font-size: 0.8rem;
    font-style: italic;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .habitat-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .habitat-chip {
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 0.68rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.03em;
  }
  .hc-continent {
    background: rgba(45,90,142,0.25);
    border: 1px solid rgba(74,144,217,0.3);
    color: #7ab8e0;
  }
  .hc-biome {
    background: rgba(58,125,68,0.2);
    border: 1px solid rgba(78,158,90,0.3);
    color: #7ed08a;
  }

  .remove-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .remove-btn:hover { border-color: var(--red-light); color: var(--red-light); }

  /* Enrichment groups */
  .enrichment-section {
    margin-bottom: 24px;
  }
  .enrichment-group {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .enrichment-group-title {
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .enrichment-members {
    font-size: 0.82rem;
    color: var(--text-dim);
  }
  .enrichment-active {
    color: var(--gold-light);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

  .count-badge {
    background: var(--selected);
    border: 1px solid var(--selected-border);
    color: var(--text-bright);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 0.7rem;
    font-family: 'Cinzel', serif;
    margin-left: 4px;
  }

  .compat-warning {
    background: rgba(139,32,32,0.12);
    border: 1px solid var(--incompatible-border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 0.78rem;
    color: #e07070;
    margin-bottom: 8px;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }

  .guest-walkthrough-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 0.68rem;
    background: rgba(155,108,217,0.15);
    border: 1px solid rgba(155,108,217,0.3);
    color: #c49de0;
    font-family: 'Cinzel', serif;
  }

  /* Terrain & plant bars */
  .terrain-section { margin-bottom: 24px; }
  .terrain-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .terrain-label {
    font-size: 0.69rem;
    font-family: 'Cinzel', serif;
    color: var(--text-dim);
    width: 52px;
    flex-shrink: 0;
    text-align: right;
  }
  .terrain-range-wrap {
    flex: 1; height: 8px; background: var(--bg3); border-radius: 4px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .terrain-range-fill { position: absolute; height: 100%; border-radius: 4px; min-width: 2px; }
  .terrain-range-impossible {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, rgba(180,30,30,0.4), rgba(180,30,30,0.4) 3px, transparent 3px, transparent 8px);
  }
  .terrain-pct-range { font-size: 0.69rem; width: 65px; text-align: right; flex-shrink: 0; }
  .terrain-pct-range.conflict { color: #e07070; }
  .terrain-pct-range.tight    { color: var(--gold-light); }
  .terrain-total {
    font-size: 0.72rem;
    margin-top: 8px;
    padding: 4px 8px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .terrain-total.ok    { background: rgba(58,125,68,0.12);  border: 1px solid rgba(78,158,90,0.25);  color: #7ed08a; }
  .terrain-total.warn  { background: rgba(200,168,69,0.12); border: 1px solid rgba(200,168,69,0.25); color: #e8c97a; }
  .terrain-total.error { background: rgba(139,32,32,0.12);  border: 1px solid var(--incompatible-border); color: #e07070; }
  .terrain-divider { margin: 10px 0 8px; border: none; border-top: 1px solid var(--border); }
  .barrier-row {
    display: flex;
    gap: 20px;
    margin-top: 4px;
  }
  .barrier-item {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }
  .barrier-item-label {
    font-size: 0.69rem;
    font-family: 'Cinzel', serif;
    color: var(--text-dim);
  }
  .barrier-item-val {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
  }
  .version-badge {
    font-size: 0.68rem;
    font-family: monospace;
    color: var(--text-dim);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: auto;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🦁 Planet Zoo Habitat Planner</h1>
  </div>
  <p>Select animals to plan your habitat</p>
</header>

<div class="layout">
  <!-- LEFT PANEL - OPTIONS -->
  <div class="left-panel">
    <div class="filters-section">

      <div class="section-title">Options</div>
      <div class="options-row" id="options-row"></div>

      <div class="filter-group">
        <div class="section-title">Content Packs</div>
        <div class="tag-group" id="pack-filters"></div>
      </div>

      <div class="filter-group">
        <div class="section-title">Biomes</div>
        <div class="tag-group" id="biome-filters"></div>
      </div>

      <div class="filter-group">
        <div class="section-title">Continents</div>
        <div class="tag-group" id="continent-filters"></div>
      </div>

      <div class="filter-group">
        <div class="section-title">Enclosure Size</div>
        <div class="enclosure-row">
          <input type="number" class="enclosure-input" id="enclosure-input" min="0" step="10" placeholder="any">
          <span class="enclosure-unit">m²</span>
          <button class="enclosure-clear" id="enclosure-clear" title="Clear">✕</button>
        </div>
      </div>

    </div>
  </div>

  <!-- MIDDLE PANEL - ANIMAL LIST -->
  <div class="animal-list-section">
    <div class="list-header">
      <input type="text" class="search-box" id="search-box" placeholder="Search animals…">
      <button class="clear-btn" id="clear-btn">Clear All</button>
    </div>
    <div class="animal-scroll" id="animal-list"></div>
  </div>

  <!-- 3RD PANEL - SELECTED ANIMALS -->
  <div class="selected-panel" id="selected-panel">
    <div class="panel-title">Selected Animals</div>
    <div class="empty-state">
      No animals selected.<br>
      Click on animals in the list to add them to your habitat.
    </div>
  </div>

  <!-- 4TH PANEL - ENCLOSURE DETAILS -->
  <div class="enclosure-panel" id="enclosure-panel">
    <div class="panel-title">Enclosure Details</div>
    <div class="empty-state">
      Select animals to view enclosure requirements.
    </div>
  </div>
</div>

</body>
</html>

<script src="animals.js"></script>
<script>
// ===== DATA =====
const CONTINENTS = ['Africa','Asia','Europe','North America','South America','Oceania'];
const BIOMES = ['Aquatic','Desert','Grassland','Taiga','Temperate','Tropical','Tundra'];
const PACKS = ['Standard','Arid','Africa','Zookeepers','Barnyard','Europe','North America',
  'Conservation','Arctic','Wetlands','Tropical','Southeast Asia','Grasslands',
  'South America','Twilight','Aquatic','Australia','Eurasia','Deluxe','Oceania','Americas','Asia'];

const CONTINENT_COLORS = {
  'Europe': 'ci-europe','North America': 'ci-namerica','South America': 'ci-samerica',
  'Africa': 'ci-africa','Asia': 'ci-asia','Oceania': 'ci-oceania'
};
const BIOME_COLORS = {
  'Aquatic': 'bd-aquatic','Desert': 'bd-desert','Grassland': 'bd-grassland',
  'Taiga': 'bd-taiga','Temperate': 'bd-temperate','Tropical': 'bd-tropical','Tundra': 'bd-tundra'
};

// ANIMALS array is defined in animals.js

// ===== STATE =====
let selectedIds = new Set();
let activePacks = new Set();
let activeBiomes = new Set();

// Initialize with all packs selected except Barnyard
PACKS.filter(p => p !== 'Barnyard').forEach(p => activePacks.add(p));
let activeContinents = new Set();
let options = {
  allowIncompatContinent: false,
  allowIncompatBiome: false,
  allowIncompatTemp: false,
  allowIncompatTerrain: false,
  allowIncompatCoverage: false,
  hideIncompat: true,
  includeExhibit: false,
  showOnlyEnrichment: false,
};
let searchQuery = '';
let enclosureSize = null;

// ===== HELPERS =====
function getAnimalById(id) { return ANIMALS.find(a => a.id === id); }
function getAnimalByName(name) { return ANIMALS.find(a => a.name === name); }

function getImgUrl(animal) {
  if (!animal.img) return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36"><rect fill="%231c2330" width="36" height="36"/><text x="18" y="24" font-size="18" text-anchor="middle">🐾</text></svg>';
  return `img/${animal.img}.png`;
}

function getSelectedAnimals() {
  return [...selectedIds].map(id => getAnimalById(id)).filter(Boolean);
}

function getCombinedContinents() {
  const sel = getSelectedAnimals();
  if (!sel.length) return new Set(CONTINENTS);
  let common = new Set(sel[0].continents);
  for (const a of sel.slice(1)) {
    for (const c of common) {
      if (!a.continents.includes(c)) common.delete(c);
    }
  }
  // union if allowing incompatible
  if (options.allowIncompatContinent) {
    const union = new Set();
    sel.forEach(a => a.continents.forEach(c => union.add(c)));
    return union;
  }
  return common;
}

const TERRAIN_TYPES = [
  {key:'grassS', label:'Grass S', color:'#4a8f3f'},
  {key:'grassL', label:'Grass L', color:'#6aaf5a'},
  {key:'soil',   label:'Soil',    color:'#8b6040'},
  {key:'rock',   label:'Rock',    color:'#7a7a7a'},
  {key:'sand',   label:'Sand',    color:'#c8a845'},
  {key:'snow',   label:'Snow',    color:'#b0d8e8'},
];

function getTerrainRanges(animals) {
  const ranges = {};
  for (const {key} of TERRAIN_TYPES) {
    ranges[key] = {
      cMin: Math.max(...animals.map(a => a.terrain[key][0])),
      cMax: Math.min(...animals.map(a => a.terrain[key][1])),
    };
  }
  return ranges;
}

function renderTerrainSection(sel) {
  const nonEx = sel.filter(a => !a.exhibit);
  if (!nonEx.length) return '';
  const ranges = getTerrainRanges(nonEx);
  const plantRange = {
    cMin: Math.max(...nonEx.map(a => a.plants[0])),
    cMax: Math.min(...nonEx.map(a => a.plants[1])),
  };
  const terrainConflict = TERRAIN_TYPES.some(({key}) => ranges[key].cMin > ranges[key].cMax);
  const totalMin = TERRAIN_TYPES.reduce((s, {key}) => s + ranges[key].cMin, 0);

  function barRow(label, color, cMin, cMax) {
    if (cMin === 0 && cMax === 0) return '';
    const impossible = cMin > cMax;
    const tight = !impossible && (cMax - cMin) <= 5;
    const pctTxt = impossible ? `${cMin}% ✗ ${cMax}%` : cMin === cMax ? `${cMin}%` : `${cMin}–${cMax}%`;
    const statusCls = impossible ? 'conflict' : tight ? 'tight' : '';
    const fillHtml = impossible
      ? '<div class="terrain-range-impossible"></div>'
      : `<div class="terrain-range-fill" style="left:${cMin}%;width:${Math.max(cMax-cMin,1)}%;background:${tight?'#c8a845':color}"></div>`;
    return `<div class="terrain-row">
      <span class="terrain-label">${label}</span>
      <div class="terrain-range-wrap">${fillHtml}</div>
      <span class="terrain-pct-range ${statusCls}">${pctTxt}</span>
    </div>`;
  }

  const plantConflict = plantRange.cMin > plantRange.cMax;
  const overallCls = (terrainConflict||plantConflict||totalMin>100)?'error':totalMin>90?'warn':'ok';
  const overallIcon = overallCls==='error'?'✗':overallCls==='warn'?'⚡':'✓';
  const overallMsg = terrainConflict?'Terrain conflict — no valid combination':
                     totalMin>100?`Min total ${totalMin}% — exceeds 100%`:
                     `Min total: ${totalMin}%`;

  const barrierAnimals = nonEx.filter(a => a.barrier);
  const barrierGrade  = barrierAnimals.length ? Math.max(...barrierAnimals.map(a => a.barrier.grade))  : null;
  const barrierHeight = barrierAnimals.length ? Math.max(...barrierAnimals.map(a => a.barrier.height)) : null;
  const barrierSection = barrierGrade !== null ? `
    <hr class="terrain-divider">
    <div class="selected-header" style="margin-bottom:4px">Barrier Requirements</div>
    <div class="barrier-row">
      <div class="barrier-item">
        <span class="barrier-item-label">Strength</span>
        <span class="barrier-item-val">Grade ${barrierGrade}</span>
      </div>
      <div class="barrier-item">
        <span class="barrier-item-label">Min Height</span>
        <span class="barrier-item-val">${barrierHeight}m</span>
      </div>
    </div>` : '';

  const landMins = nonEx.filter(a => a.landMin).map(a => a.landMin);
  const minEnclosure = landMins.length ? Math.max(...landMins) : null;
  const enclosureSection = minEnclosure !== null ? `
    <hr class="terrain-divider">
    <div class="selected-header" style="margin-bottom:4px">Minimum Enclosure Size</div>
    <div class="barrier-row">
      <div class="barrier-item">
        <span class="barrier-item-label">Land Area</span>
        <span class="barrier-item-val">${minEnclosure.toLocaleString()} m²</span>
      </div>
    </div>` : '';

  return `<div class="terrain-section">
    <div class="selected-header">Terrain <span style="font-size:0.72rem;font-weight:400;color:var(--text-dim)">(combined viable range)</span></div>
    ${TERRAIN_TYPES.map(({key,label,color})=>barRow(label,color,ranges[key].cMin,ranges[key].cMax)).join('')}
    <span class="terrain-total ${overallCls}">${overallIcon} ${overallMsg}</span>
    <hr class="terrain-divider">
    <div class="selected-header" style="margin-bottom:4px">Plant Coverage</div>
    ${barRow('Plants','#2d7a3a',plantRange.cMin,plantRange.cMax)}
    ${barrierSection}
    ${enclosureSection}
  </div>`;
}

function getCombinedBiomes() {
  const sel = getSelectedAnimals();
  if (!sel.length) return new Set(BIOMES);
  if (options.allowIncompatBiome) {
    const union = new Set();
    sel.forEach(a => a.biomes.forEach(b => union.add(b)));
    return union;
  }
  let common = new Set(sel[0].biomes);
  for (const a of sel.slice(1)) {
    for (const b of [...common]) {
      if (!a.biomes.includes(b)) common.delete(b);
    }
  }
  return common;
}

function isCompatibleWith(animal) {
  const sel = getSelectedAnimals();
  if (!sel.length) return true;
  if (!options.allowIncompatContinent) {
    const commonC = getCombinedContinents();
    const overlap = animal.continents.some(c => commonC.has(c));
    if (!overlap) return false;
  }
  if (!options.allowIncompatBiome) {
    const commonB = getCombinedBiomes();
    const overlap = animal.biomes.some(b => commonB.has(b));
    if (!overlap) return false;
  }
  if (!options.allowIncompatTerrain && !animal.exhibit) {
    const testSel = [...getSelectedAnimals().filter(a => !a.exhibit), animal];
    if (testSel.length > 1) {
      const conflict = TERRAIN_TYPES.some(({key}) => {
        const cMin = Math.max(...testSel.map(a => a.terrain[key][0]));
        const cMax = Math.min(...testSel.map(a => a.terrain[key][1]));
        return cMin > cMax;
      });
      const totalMin = TERRAIN_TYPES.reduce((s,{key}) => s + Math.max(...testSel.map(a => a.terrain[key][0])), 0);
      if (conflict || totalMin > 100) return false;
    }
  }
  if (!options.allowIncompatCoverage && !animal.exhibit) {
    const testSel = [...getSelectedAnimals().filter(a => !a.exhibit), animal];
    if (testSel.length > 1) {
      const cMin = Math.max(...testSel.map(a => a.plants[0]));
      const cMax = Math.min(...testSel.map(a => a.plants[1]));
      if (cMin > cMax) return false;
    }
  }
  return true;
}

function passesFilters(animal) {
  if (animal.exhibit && !options.includeExhibit) return false;
  if (activePacks.size && !activePacks.has(animal.pack)) return false;
  if (activeContinents.size && !animal.continents.some(c => activeContinents.has(c))) return false;
  if (activeBiomes.size && !animal.biomes.some(b => activeBiomes.has(b))) return false;
  if (enclosureSize !== null && !animal.exhibit && animal.landMin > enclosureSize) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    if (!animal.name.toLowerCase().includes(q) && !animal.latin.toLowerCase().includes(q)) return false;
  }
  return true;
}

// ===== RENDER =====
function renderFilters() {
  // Options
  const optRow = document.getElementById('options-row');
  const optDefs = [
    ['allowIncompatContinent','Allow Incompatible Continent'],
    ['allowIncompatBiome','Allow Incompatible Biome'],
    ['allowIncompatTemp','Allow Incompatible Temperature'],
    ['allowIncompatTerrain','Allow Incompatible Terrain'],
    ['allowIncompatCoverage','Allow Incompatible Coverage'],
    ['hideIncompat','Hide Incompatible Animals'],
    ['includeExhibit','Include Exhibit Animals'],
    ['showOnlyEnrichment','Show Only Enrichment Matches'],
  ];
  optRow.innerHTML = optDefs.map(([k,label]) => `
    <label class="toggle-row">
      <input type="checkbox" data-opt="${k}" ${options[k]?'checked':''}>
      <span>${label}</span>
    </label>
  `).join('');
  optRow.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      options[cb.dataset.opt] = cb.checked;
      renderAll();
    });
  });

  // Packs
  document.getElementById('pack-filters').innerHTML = `
    <div class="filter-buttons">
      <button id="select-all-packs">Select All</button>
      <button id="deselect-all-packs">Deselect All</button>
    </div>
    ${PACKS.map(p => `
      <span class="tag ${activePacks.has(p)?'active':''}" data-pack="${p}">${p}</span>
    `).join('')}
  `;
  document.querySelectorAll('[data-pack]').forEach(el => {
    el.addEventListener('click', () => {
      const p = el.dataset.pack;
      activePacks.has(p) ? activePacks.delete(p) : activePacks.add(p);
      renderAll();
    });
  });

  // Add event listeners for select/deselect all buttons
  document.getElementById('select-all-packs').addEventListener('click', () => {
    // Select all packs except 'Barnyard'
    PACKS.filter(p => p !== 'Barnyard').forEach(p => activePacks.add(p));
    renderAll();
  });

  document.getElementById('deselect-all-packs').addEventListener('click', () => {
    // Deselect all packs
    activePacks.clear();
    renderAll();
  });

  // Biomes
  document.getElementById('biome-filters').innerHTML = BIOMES.map(b => `
    <span class="tag ${activeBiomes.has(b)?'active':''}" data-biome="${b}">
      <span class="biome-dot bd-${b.toLowerCase()}"></span>${b}
    </span>
  `).join('');
  document.querySelectorAll('[data-biome]').forEach(el => {
    el.addEventListener('click', () => {
      const b = el.dataset.biome;
      activeBiomes.has(b) ? activeBiomes.delete(b) : activeBiomes.add(b);
      renderAll();
    });
  });

  // Continents
  document.getElementById('continent-filters').innerHTML = CONTINENTS.map(c => {
    const cls = CONTINENT_COLORS[c] || '';
    const key = c.toLowerCase().replace(' ','');
    return `<span class="tag continent-tag ${activeContinents.has(c)?'active':''}" data-continent="${c}">
      <span class="continent-icon ${cls}"></span>${c}
    </span>`;
  }).join('');
  document.querySelectorAll('[data-continent]').forEach(el => {
    el.addEventListener('click', () => {
      const c = el.dataset.continent;
      activeContinents.has(c) ? activeContinents.delete(c) : activeContinents.add(c);
      renderAll();
    });
  });
}

function renderAnimalList() {
  const container = document.getElementById('animal-list');
  const visible = ANIMALS.filter(a => passesFilters(a));
  const sel = getSelectedAnimals();

  if (!visible.length) {
    container.innerHTML = `<div style="color:var(--text-dim);font-style:italic;padding:20px;text-align:center;font-size:0.85rem">No animals match your filters.</div>`;
    return;
  }

  container.innerHTML = visible.filter(animal => {
    if (options.hideIncompat && !selectedIds.has(animal.id) && !isCompatibleWith(animal)) return false;
    if (options.showOnlyEnrichment) {
      if (!sel.length) return animal.enrichedBy.length > 0;
      if (!selectedIds.has(animal.id) && !getEnrichmentMatch(animal, sel)) return false;
    }
    return true;
  }).map(animal => {
    const isSelected = selectedIds.has(animal.id);
    const compat = isCompatibleWith(animal);
    const incompatCls = (!isSelected && !compat) ? 'incompatible-item' : '';
    const exhibitCls = animal.exhibit ? 'exhibit' : '';
    const enrichMatch = getEnrichmentMatch(animal, sel);
    const heartCls = enrichMatch === 'mutual' ? 'mutual' : enrichMatch === 'one-way' ? 'one-way' : '';
    const heartTitle = enrichMatch === 'mutual' ? 'Mutual enrichment' : enrichMatch === 'one-way' ? 'One-way enrichment' : 'Has enrichment partners';
    return `
      <div class="animal-item ${isSelected?'selected':''} ${incompatCls} ${exhibitCls}" data-id="${animal.id}" title="${animal.exhibit?'Exhibit animal':''}">
        <img class="animal-img-thumb" src="${getImgUrl(animal)}" alt="${animal.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><rect fill=%22%231c2330%22 width=%2236%22 height=%2236%22/><text x=%2218%22 y=%2224%22 font-size=%2218%22 text-anchor=%22middle%22>🐾</text></svg>'">
        <div class="animal-name-block">
          <div class="animal-common">${animal.name}</div>
          <div class="animal-latin">${animal.latin}${animal.landMin ? `<span class="land-chip">${animal.landMin}m²</span>` : ''}</div>
        </div>
        <div class="animal-icons">
          ${animal.enrichedBy.length ? `<span class="icon-heart ${heartCls}" title="${heartTitle}">♥</span>` : ''}
          ${animal.guestWalk ? '<span class="icon-shoe" title="Guests can walk through">👣</span>' : ''}
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.animal-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const animal = getAnimalById(id);
      if (!animal) return;
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        if (!isCompatibleWith(animal) && !options.allowIncompatContinent && !options.allowIncompatBiome) return;
        selectedIds.add(id);
      }
      renderAll();
    });
  });
}

function renderRightPanel() {
  const panel = document.getElementById('right-panel');
  const sel = getSelectedAnimals();

  if (!sel.length) {
    panel.innerHTML = `
      <div class="panel-title">Habitat Requirements</div>
      <div class="empty-state">
        Click on animals in the list to add them to your habitat.<br>
        The planner will show combined requirements and compatibility.
      </div>
    `;
    return;
  }

  const combinedContinents = getCombinedContinents();
  const combinedBiomes = getCombinedBiomes();

  // Find enrichment groups active in selection
  const enrichmentGroups = findEnrichmentGroups(sel);

  // Compatibility warnings
  let warnings = [];
  if (sel.length > 1) {
    // Check continent overlaps
    const noContOverlap = sel.filter(a => ![...combinedContinents].some(c => a.continents.includes(c)));
    if (noContOverlap.length) warnings.push(`Continent mismatch: ${noContOverlap.map(a=>a.name).join(', ')}`);
    const noBiomeOverlap = sel.filter(a => ![...combinedBiomes].some(b => a.biomes.includes(b)));
    if (noBiomeOverlap.length) warnings.push(`Biome mismatch: ${noBiomeOverlap.map(a=>a.name).join(', ')}`);
  }

  const guestWalkAll = sel.every(a => a.guestWalk);
  const guestWalkSome = sel.some(a => a.guestWalk);

  panel.innerHTML = `
    <div class="panel-title">Habitat Requirements <span style="font-size:0.8rem;font-weight:400;color:var(--text-dim)">(${sel.length} animal${sel.length!==1?'s':''})</span></div>

    ${warnings.map(w => `<div class="compat-warning">⚠ ${w}</div>`).join('')}

    <div class="req-grid">
      <div class="req-card">
        <div class="req-card-title">Compatible Continents</div>
        <div class="req-badges">
          ${[...combinedContinents].map(c => `<span class="req-badge required">
            <span class="continent-icon ${CONTINENT_COLORS[c]||''}" style="width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0"></span>
            ${c}
          </span>`).join('') || '<span style="color:var(--text-dim);font-size:0.75rem;font-style:italic">None in common</span>'}
        </div>
      </div>
      <div class="req-card">
        <div class="req-card-title">Compatible Biomes</div>
        <div class="req-badges">
          ${[...combinedBiomes].map(b => `<span class="req-badge compatible">
            <span class="biome-dot bd-${b.toLowerCase()}" style="width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0"></span>
            ${b}
          </span>`).join('') || '<span style="color:var(--text-dim);font-size:0.75rem;font-style:italic">None in common</span>'}
        </div>
      </div>
      <div class="req-card">
        <div class="req-card-title">Guest Walkthrough</div>
        <div class="req-badges">
          ${guestWalkAll ? '<span class="req-badge compatible">✓ All animals allow guests</span>'
            : guestWalkSome ? '<span class="req-badge warn">⚡ Some animals allow guests</span>'
            : '<span class="req-badge" style="background:rgba(80,80,80,0.2);border:1px solid rgba(120,120,120,0.3);color:var(--text-dim)">✗ No walkthrough</span>'}
        </div>
      </div>
      ${enrichmentGroups.length ? `
      <div class="req-card">
        <div class="req-card-title">Enrichment Groups</div>
        <div class="req-badges">
          <span class="req-badge" style="background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);color:var(--gold-light)">♥ ${enrichmentGroups.length} group${enrichmentGroups.length!==1?'s':''} active</span>
        </div>
      </div>` : ''}
    </div>

    ${renderTerrainSection(sel)}

    ${enrichmentGroups.length ? `
    <div class="enrichment-section">
      <div class="selected-header">Enrichment Groups</div>
      ${enrichmentGroups.map(g => `
        <div class="enrichment-group">
          <div class="enrichment-group-title">♥ Enrichment Group</div>
          <div class="enrichment-members">${g.map(name => {
            const inSel = sel.some(a => a.name === name);
            return `<span class="${inSel?'enrichment-active':''}">${name}</span>`;
          }).join(' · ')}</div>
        </div>
      `).join('')}
    </div>` : ''}

    <div class="selected-header">Selected Animals <span class="count-badge">${sel.length}</span></div>
    <div class="selected-animals">
      ${sel.map(animal => `
        <div class="selected-animal-card">
          <img class="selected-animal-img" src="${getImgUrl(animal)}" alt="${animal.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 52 52%22><rect fill=%22%231c2330%22 width=%2252%22 height=%2252%22/><text x=%2226%22 y=%2234%22 font-size=%2228%22 text-anchor=%22middle%22>🐾</text></svg>'">
          <div class="selected-animal-info">
            <div class="selected-animal-name">${animal.name}</div>
            <div class="selected-animal-latin">${animal.latin}</div>
            <div class="habitat-chips">
              ${animal.continents.map(c => `<span class="habitat-chip hc-continent">${c}</span>`).join('')}
              ${animal.biomes.map(b => `<span class="habitat-chip hc-biome">${b}</span>`).join('')}
              ${animal.guestWalk ? '<span class="guest-walkthrough-badge">👣 Walkthrough</span>' : ''}
            </div>
          </div>
          <button class="remove-btn" data-remove="${animal.id}" title="Remove">✕</button>
        </div>
      `).join('')}
    </div>
  `;

  panel.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedIds.delete(btn.dataset.remove);
      renderAll();
    });
  });
}

function getEnrichmentMatch(animal, selectedAnimals) {
  if (!selectedAnimals.length) return null;
  let hasMutual = false;
  let hasOneWay = false;
  for (const sel of selectedAnimals) {
    if (sel.id === animal.id) continue;
    const aEnrichesS = animal.enrichedBy.includes(sel.name);
    const sEnrichesA = sel.enrichedBy.includes(animal.name);
    if (aEnrichesS && sEnrichesA) { hasMutual = true; break; }
    if (aEnrichesS || sEnrichesA) hasOneWay = true;
  }
  return hasMutual ? 'mutual' : hasOneWay ? 'one-way' : null;
}

function findEnrichmentGroups(selectedAnimals) {
  const visited = new Set();
  const groups = [];
  
  for (const animal of selectedAnimals) {
    if (!animal.enrichedBy.length) continue;
    const groupSet = new Set([animal.name, ...animal.enrichedBy]);
    const key = [...groupSet].sort().join('|');
    if (visited.has(key)) continue;
    
    // Check if any member of this group's enrichedBy is in the selection
    const enrichPartners = animal.enrichedBy.filter(name => 
      selectedAnimals.some(a => a.name === name)
    );
    if (enrichPartners.length) {
      visited.add(key);
      // Collect all members that appear in this enrichment relationship
      const groupMembers = new Set([animal.name]);
      enrichPartners.forEach(n => groupMembers.add(n));
      // Also add anyone that lists animal as their enrichedBy partner
      for (const other of selectedAnimals) {
        if (other.enrichedBy.includes(animal.name)) groupMembers.add(other.name);
      }
      groups.push([...groupMembers]);
    }
  }
  return groups;
}

function renderAll() {
  renderFilters();
  renderAnimalList();
  renderSelectedPanel();
  renderEnclosurePanel();
}

// ===== INIT =====
document.getElementById('search-box').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderAnimalList();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  selectedIds.clear();
  renderAll();
});

// Ensure the enclosure input elements exist before adding event listeners
const enclosureInput = document.getElementById('enclosure-input');
const enclosureClear = document.getElementById('enclosure-clear');

if (enclosureInput && enclosureClear) {
  enclosureInput.addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    enclosureSize = (!e.target.value || isNaN(v) || v <= 0) ? null : v;
    renderAnimalList();
  });

  enclosureClear.addEventListener('click', () => {
    enclosureInput.value = '';
    enclosureSize = null;
    renderAnimalList();
  });
}

renderAll();

const BUILD_TIME = '@@BUILD_TIME@@';
if (window.location.hostname.startsWith('staging.')) {
  const d = new Date(BUILD_TIME);
  if (!isNaN(d.getTime())) {
    const ts = d.toISOString().slice(0,16).replace('T',' ') + ' UTC';
    const diffMs = Date.now() - d.getTime();
    const diffMins = Math.floor(diffMs / 60000);
    const ago = diffMins < 60
      ? `${diffMins}m ago`
      : diffMins < 1440
        ? `${Math.floor(diffMins/60)}h ${diffMins%60}m ago`
        : `${Math.floor(diffMins/1440)}d ${Math.floor((diffMins%1440)/60)}h ago`;
    document.querySelector('header').insertAdjacentHTML(
      'beforeend', `<span class="version-badge">staging · ${ts} · ${ago}</span>`
    );
  }
}

            </div>

    </div>

function renderEnclosurePanel() {
  const panel = document.getElementById('enclosure-panel');
  const sel = getSelectedAnimals();

  if (!sel.length) {
    panel.innerHTML = `
      <div class="panel-title">Enclosure Details</div>
      <div class="empty-state">
        Select animals to view enclosure requirements.
      </div>
    `;
    return;
  }

  const combinedContinents = getCombinedContinents();
  const combinedBiomes = getCombinedBiomes();

  // Find enrichment groups active in selection
  const enrichmentGroups = findEnrichmentGroups(sel);

  // Compatibility warnings
  let warnings = [];
  if (sel.length > 1) {
    // Check continent overlaps
    const noContOverlap = sel.filter(a => ![...combinedContinents].some(c => a.continents.includes(c)));
    if (noContOverlap.length) warnings.push(`Continent mismatch: ${noContOverlap.map(a=>a.name).join(', ')}`);
    const noBiomeOverlap = sel.filter(a => ![...combinedBiomes].some(b => a.biomes.includes(b)));
    if (noBiomeOverlap.length) warnings.push(`Biome mismatch: ${noBiomeOverlap.map(a=>a.name).join(', ')}`);
  }

  const guestWalkAll = sel.every(a => a.guestWalk);
  const guestWalkSome = sel.some(a => a.guestWalk);

  panel.innerHTML = `
    <div class="panel-title">Habitat Requirements <span style="font-size:0.8rem;font-weight:400;color:var(--text-dim)">(${sel.length} animal${sel.length!==1?'s':''})</span></div>

    ${warnings.map(w => `<div class="compat-warning">⚠ ${w}</div>`).join('')}

    <div class="req-grid">
      <div class="req-card">
        <div class="req-card-title">Compatible Continents</div>
        <div class="req-badges">
          ${Array.from(combinedContinents).map(c => `<span class="req-badge required">
            <span class="continent-icon ${CONTINENT_COLORS[c]||''}" style="width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0"></span>
            ${c}
          </span>`).join('') || '<span style="color:var(--text-dim);font-size:0.75rem;font-style:italic">None in common</span>'}
        </div>
      </div>
      <div class="req-card">
        <div class="req-card-title">Compatible Biomes</div>
        <div class="req-badges">
          ${Array.from(combinedBiomes).map(b => `<span class="req-badge compatible">
            <span class="biome-dot bd-${b.toLowerCase()}" style="width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0"></span>
            ${b}
          </span>`).join('') || '<span style="color:var(--text-dim);font-size:0.75rem;font-style:italic">None in common</span>'}
        </div>
      </div>
      <div class="req-card">
        <div class="req-card-title">Guest Walkthrough</div>
        <div class="req-badges">
          ${guestWalkAll ? '<span class="req-badge compatible">✓ All animals allow guests</span>'
            : guestWalkSome ? '<span class="req-badge warn">⚡ Some animals allow guests</span>'
            : '<span class="req-badge" style="background:rgba(80,80,80,0.2);border:1px solid rgba(120,120,120,0.3);color:var(--text-dim)">✗ No walkthrough</span>'}
        </div>
      </div>
      ${enrichmentGroups.length ? `
      <div class="req-card">
        <div class="req-card-title">Enrichment Groups</div>
        <div class="req-badges">
          <span class="req-badge" style="background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);color:var(--gold-light)">♥ ${enrichmentGroups.length} group${enrichmentGroups.length!==1?'s':''} active</span>
        </div>
      </div>` : ''}
    </div>

    ${renderTerrainSection(sel)}

    ${enrichmentGroups.length ? `
    <div class="enrichment-section">
      <div class="selected-header">Enrichment Groups</div>
      ${enrichmentGroups.map(g => `
        <div class="enrichment-group">
          <div class="enrichment-group-title">♥ Enrichment Group</div>
          <div class="enrichment-members">${g.map(name => {
            const inSel = sel.some(a => a.name === name);
            return `<span class="${inSel?'enrichment-active':''}">${name}</span>`;
          }).join(' · ')}</div>
        </div>
      `).join('')}
    </div>` : ''}
  `;
}
